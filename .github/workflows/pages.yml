name: Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify site exists
        run: |
          test -f site/package.json || (echo "Missing site/package.json. Create Astro site under ./site or update workflow paths." && exit 1)

      - name: Install deps
        working-directory: site
        run: npm install

      - name: Build site
        working-directory: site
        run: |
          set -euxo pipefail
          npm run build -- --verbose
          echo "== build cwd =="
          pwd
          echo "== build cwd listing =="
          ls -la
          echo "== build dist listing (if any) =="
          ls -la dist || true
          test -d dist || (echo "Missing dist/ in site after build" && exit 1)

      - name: Verify dist output
        run: |
          echo "== repo root =="
          pwd
          ls -la
          echo "== site dir =="
          ls -la site
          echo "== site/dist =="
          ls -la site/dist || true
          echo "== dist at repo root (if any) =="
          ls -la dist || true
          test -d site/dist || (echo "Missing site/dist after build" && exit 1)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

